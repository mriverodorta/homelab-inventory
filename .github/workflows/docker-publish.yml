name: Docker Publish

on:
  push:
    branches:
      - main
      - stable
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: mriverodorta/homelab-inventory
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release notes
        run: bun scripts/check-release-notes.mjs --require-current-version

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Smoke-test runtime image
        shell: bash
        run: |
          set -euo pipefail
          docker build --tag homelab-inventory-smoke .
          container_id="$(docker run --detach --publish 127.0.0.1::8798 homelab-inventory-smoke)"
          trap 'docker rm --force "$container_id" >/dev/null 2>&1 || true' EXIT
          host_port="$(docker port "$container_id" 8798/tcp | sed 's/.*://')"

          for attempt in {1..20}; do
            if curl --fail --silent "http://127.0.0.1:${host_port}/api/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Hub token
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error title=Missing Docker Hub token::Add a DOCKERHUB_TOKEN repository secret with permission to push ${IMAGE_NAME}."
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mriverodorta
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: docker_tags
        shell: bash
        run: |
          set -euo pipefail

          tags=()
          version="$(bun -p "require('./package.json').version")"
          channel="release"
          verification_tag=""

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=("${IMAGE_NAME}:latest")
            channel="latest"
            verification_tag="latest"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "stable" ]]; then
            tags+=("${IMAGE_NAME}:stable")
            channel="stable"
            verification_tag="stable"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${version}" ]]; then
              echo "::error title=Version mismatch::Git tag ${tag_version} does not match package version ${version}."
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            tags+=("${IMAGE_NAME}:${tag_version}")
            tags+=("${IMAGE_NAME}:${major}.${minor}")
            verification_tag="${tag_version}"
          fi

          {
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "version=${version}"
            echo "channel=${channel}"
            echo "verification_tag=${verification_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ steps.docker_tags.outputs.version }}
            APP_REVISION=${{ github.sha }}
            APP_CHANNEL=${{ steps.docker_tags.outputs.channel }}
          labels: |
            org.opencontainers.image.version=${{ steps.docker_tags.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/mriverodorta/homelab-inventory
            io.homelab-inventory.channel=${{ steps.docker_tags.outputs.channel }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published image metadata
        if: steps.docker_tags.outputs.verification_tag != ''
        run: >-
          bun scripts/verify-published-image.mjs
          --tag "${{ steps.docker_tags.outputs.verification_tag }}"
          --version "${{ steps.docker_tags.outputs.version }}"
          --revision "${{ github.sha }}"
          --channel "${{ steps.docker_tags.outputs.channel }}"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
